name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security self-check (npm test)
        run: npm test

  rust:
    name: Rust crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/crates/crypto-core

      - name: cargo test (crypto-core)
        run: cargo test --manifest-path backend/crates/crypto-core/Cargo.toml

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: npm audit (production, high+, fixable only)
        working-directory: backend
        run: |
          npm audit --omit=dev --json > /tmp/audit.json || true
          node -e "
            const d = require('/tmp/audit.json');
            const all = Object.values(d.vulnerabilities || {}).filter(v => v.severity === 'high' || v.severity === 'critical');
            const fixable = all.filter(v => v.fixAvailable === true);
            if (fixable.length) {
              console.error('Fixable high+ severity vulnerabilities:');
              fixable.forEach(v => console.error('-', v.name, v.severity));
              process.exit(1);
            }
            const stuck = all.length - fixable.length;
            if (stuck) console.log(stuck + ' high+ vulnerabilities with no compatible upstream fix yet (downgrade-only or none), tracked but not blocking.');
            console.log('No fixable high+ vulnerabilities.');
          "

      - name: cargo audit (crypto-core)
        uses: rustsec/audit-check@v2.0.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}